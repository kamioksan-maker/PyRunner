name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Download Gradle Wrapper
      run: |
        mkdir -p gradle/wrapper
        curl -L -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.5.0/gradle/wrapper/gradle-wrapper.jar

    - name: Create gradlew script
      run: |
        printf '#!/bin/sh\n\nAPP_BASE_NAME=${0##*/}\nAPP_HOME=$( cd "$( dirname "$0" )" > /dev/null && pwd )\nCLASSPATH=$APP_HOME/gradle/wrapper/gradle-wrapper.jar\nexec java -Xmx2048m -classpath "$CLASSPATH" org.gradle.wrapper.GradleWrapperMain "$@"\n' > gradlew
        chmod +x gradlew

    - name: Create debug keystore
      run: |
        mkdir -p app
        keytool -genkey -v -keystore app/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"

    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon --no-build-cache --stacktrace

    - name: Build Release APK
      run: ./gradlew assembleRelease --no-daemon --no-build-cache --stacktrace

    - name: List APK files
      run: |
        echo "Debug APKs:"
        ls -la app/build/outputs/apk/debug/ || echo "No debug APK found"
        echo "Release APKs:"
        ls -la app/build/outputs/apk/release/ || echo "No release APK found"

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: PyRunner-Debug
        path: app/build/outputs/apk/debug/*.apk
        if-no-files-found: warn

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: PyRunner-Release
        path: app/build/outputs/apk/release/*.apk
        if-no-files-found: warn

    - name: Create Release
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: PyRunner v1.0.${{ github.run_number }}
        body: |
          ## PyRunner - Android Python脚本运行器
          
          ### 下载说明
          - **app-debug.apk**: 调试版本，可直接安装
          - **app-release.apk**: 发布版本（使用debug签名）
          
          ### 安装方法
          1. 下载APK文件
          2. 在手机上打开文件
          3. 允许安装未知来源应用
          4. 完成安装
        files: |
          app/build/outputs/apk/debug/*.apk
          app/build/outputs/apk/release/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
